name: Update awesome list

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate README
        env:
          API_TOKEN: ${{ secrets.API_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_USER: ${{ github.repository_owner }}
        run: |
          node <<'NODE'
          const fs = require('fs');

          const token = process.env.API_TOKEN || process.env.GITHUB_TOKEN;
          const user = process.env.GITHUB_USER;

          if (!token) {
            throw new Error('Missing token');
          }

          async function fetchStarredRepos() {
            const repos = [];

            for (let page = 1; ; page += 1) {
              const url = `https://api.github.com/users/${user}/starred?per_page=100&page=${page}`;
              const response = await fetch(url, {
                headers: {
                  Authorization: `Bearer ${token}`,
                  Accept: 'application/vnd.github+json',
                  'X-GitHub-Api-Version': '2022-11-28',
                  'User-Agent': `${user}-awesome-stars-workflow`,
                },
              });

              if (!response.ok) {
                throw new Error(`GitHub API ${response.status}: ${await response.text()}`);
              }

              const items = await response.json();
              if (!items.length) {
                break;
              }

              repos.push(...items);

              if (items.length < 100) {
                break;
              }
            }

            return repos;
          }

          function groupByLanguage(repos) {
            const map = new Map();

            for (const repo of repos) {
              const language = repo.language || 'Unknown';
              if (!map.has(language)) {
                map.set(language, []);
              }
              map.get(language).push(repo);
            }

            const entries = Array.from(map.entries()).sort(([a], [b]) => a.localeCompare(b));
            return entries.map(([language, items]) => ({
              language,
              repos: items.sort((a, b) => a.full_name.localeCompare(b.full_name)),
            }));
          }

          function renderReadme(owner, groups) {
            let output = `# ${owner} Awesome List [![Awesome](https://cdn.rawgit.com/sindresorhus/awesome/d7305f38d29fed78fa85652e3a63e154dd8e8829/media/badge.svg)](https://github.com/sindresorhus/awesome)\n\n`;
            output += `> :star: generated with GitHub Actions\n\n\n`;
            output += `> star_list: [${owner}'s Stars](https://github.com/${owner}?tab=stars)\n\n\n`;
            output += `## Table of Contents\n\n`;

            for (const { language, repos } of groups) {
              output += `## ${language}\n\n`;

              for (const repo of repos) {
                const description = (repo.description || '').replace(/\r?\n/g, ' ');
                output += `- [${repo.full_name}](${repo.html_url}) - ${description}\n`;
              }

              output += `  \n\n`;
            }

            return output;
          }

          (async () => {
            const repos = await fetchStarredRepos();
            const groups = groupByLanguage(repos);
            const readme = renderReadme(user, groups);
            const current = fs.readFileSync('README.md', 'utf8');

            if (current !== readme) {
              fs.writeFileSync('README.md', readme);
              console.log('README.md updated');
            } else {
              console.log('README.md unchanged');
            }
          })().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          NODE

      - name: Commit README changes
        run: |
          if git diff --quiet -- README.md; then
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "docs: update awesome list"
          git push
